<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MSBrOSs AI - Plataforma multimodelo de inteligencia artificial con voz Adele">
    <title>MSBrOSs • MSBrossAI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Ambient Orb */
        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: var(--accent);
            filter: blur(140px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 20s infinite alternate ease-in-out;
        }

        @keyframes orbFloat {
            0% { transform: translate(-30px, -30px) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        /* Glassmorphic Container */
        .glass-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 
                        0 0 40px var(--accent-glow),
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s ease;
        }

        .glass-card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        p.desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
            border: none;
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--accent-glow), 0 0 10px var(--accent);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="glass-card">
        <div class="icon-wrapper">🧠</div>
        <div>
            <h1>MSBrOSs</h1>
            <div class="subtitle">Voice AI Platform</div>
        </div>
        <p class="desc">Plataforma de inteligencia artificial multimodelo con integración de voz Adele y herramientas inteligentes de productividad.</p>
        <a href="/app/msbross/" class="btn btn-primary">Abrir Aplicación</a>
        <a href="/" class="btn btn-secondary">Volver al Portal</a>
    </div>

</body>
</html>
