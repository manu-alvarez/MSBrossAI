<style>
:root {
    --bg: #030712;
    --text: #f8fafc;
    --text-muted: #64748b;
    --accent-1: #8b5cf6;
    --accent-2: #06b6d4;
    --accent-3: #10b981;
    --accent-6: #ec4899;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* ═══ HERO ═══ */
.hero{position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;overflow:hidden}
#hero-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.hero-logo-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:1rem}
.hero-logo{width:200px;height:200px;border-radius:32px;object-fit:cover;
    box-shadow:0 0 60px rgba(139,92,246,0.5),0 0 120px rgba(6,182,212,0.3),0 0 200px rgba(236,72,153,0.2);
    animation:logoPulse 4s ease-in-out infinite,logoFloat 6s ease-in-out infinite;cursor:pointer;transition:transform .3s}
.hero-logo:hover{transform:scale(1.12) rotate(3deg)}
@keyframes logoPulse{0%,100%{box-shadow:0 0 60px rgba(139,92,246,0.5),0 0 120px rgba(6,182,212,0.3)}50%{box-shadow:0 0 100px rgba(139,92,246,0.7),0 0 200px rgba(6,182,212,0.4),0 0 300px rgba(236,72,153,0.3)}}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.hero-title{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;letter-spacing:-.04em;
    background:linear-gradient(135deg,var(--accent-1),var(--accent-2),var(--accent-6));
    background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:gradShift 6s ease infinite;text-align:center}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero-sub{font-size:1.1rem;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;font-weight:500}
.scroll-hint{position:absolute;bottom:2rem;z-index:2;display:flex;flex-direction:column;align-items:center;gap:.5rem;color:var(--text-muted);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;animation:hintPulse 2s ease-in-out infinite}
.scroll-hint .arrow{width:24px;height:24px;border-right:2px solid var(--accent-1);border-bottom:2px solid var(--accent-1);transform:rotate(45deg);animation:arrowBounce 2s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes arrowBounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(8px)}}

/* ═══ WORMHOLE TUNNEL — Full-screen fixed canvas ═══ */
#wormhole-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:0;transition:opacity .3s}

/* ═══ PORTAL SPACER ═══ */
.portal-spacer{height:30vh;position:relative;z-index:0}

/* ═══ APPS ═══ */
.apps-container{position:relative;z-index:5;max-width:1400px;width:100%;padding:6rem 2rem 4rem;margin:0 auto}
.section-header{text-align:center;margin-bottom:4rem}
.section-header h2{font-size:2.5rem;font-weight:900;letter-spacing:-.03em;
    background:linear-gradient(135deg,#fff 0%,var(--accent-2) 50%,var(--accent-1) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.section-header p{color:var(--text-muted);font-size:1rem;letter-spacing:.05em}
.section-line{width:80px;height:3px;margin:1rem auto 0;border-radius:2px;
    background:linear-gradient(90deg,var(--accent-1),var(--accent-2));animation:linePulse 3s ease-in-out infinite}
@keyframes linePulse{0%,100%{width:80px;opacity:.6}50%{width:160px;opacity:1}}

.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.5rem}

/* ═══ PREMIUM CARD ═══ */
.app-card{
    position:relative;
    background:rgba(255,255,255,0.02);
    border-radius:20px;
    padding:2px; /* border gradient space */
    text-decoration:none;
    color:var(--text);
    opacity:0;
    transform:translateY(80px) scale(0.8) rotateX(8deg);
    transition:all .7s cubic-bezier(.16,1,.3,1);
    perspective:800px;
}
.app-card.revealed{opacity:1;transform:translateY(0) scale(1) rotateX(0deg)}

/* Animated gradient border */
.app-card::before{
    content:'';position:absolute;inset:0;border-radius:20px;padding:1.5px;
    background:linear-gradient(var(--border-angle,0deg),var(--card-accent,#8b5cf6),transparent 40%,transparent 60%,var(--card-accent,#8b5cf6));
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:borderSpin 4s linear infinite;opacity:.5;transition:opacity .4s;
}
.app-card:hover::before{opacity:1}
@keyframes borderSpin{to{--border-angle:360deg}}
@property --border-angle{syntax:'<angle>';inherits:false;initial-value:0deg}

/* Card inner */
.card-inner{
    background:rgba(8,12,24,0.85);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:19px;padding:1.8rem;
    display:flex;flex-direction:column;gap:.8rem;
    position:relative;overflow:hidden;height:100%;
}

/* Glow follow cursor */
.card-inner::after{
    content:'';position:absolute;width:300px;height:300px;
    border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,var(--card-accent,#8b5cf6) 0%,transparent 70%);
    opacity:0;transition:opacity .4s;
    left:var(--gx,-150px);top:var(--gy,-150px);
    transform:translate(-50%,-50%);filter:blur(40px);
}
.app-card:hover .card-inner::after{opacity:.12}

.app-card:hover{transform:translateY(-10px) scale(1.03)}

.card-header{display:flex;align-items:center;gap:1rem;position:relative;z-index:1}
.card-icon{
    width:54px;height:54px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;flex-shrink:0;
    background:linear-gradient(135deg,var(--card-accent,#8b5cf6),transparent);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 20px var(--card-accent,rgba(139,92,246,0.3));
}
.card-title{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;position:relative;z-index:1}
.card-badge{
    font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    padding:.2rem .6rem;border-radius:100px;margin-left:auto;
    background:rgba(255,255,255,0.06);border:1px solid var(--card-accent,#8b5cf6);
    color:var(--card-accent,#8b5cf6);position:relative;z-index:1;
}
.card-desc{font-size:.85rem;color:var(--text-muted);line-height:1.6;position:relative;z-index:1}
.card-tech{display:flex;flex-wrap:wrap;gap:.4rem;position:relative;z-index:1}
.tech-tag{
    font-size:.65rem;font-weight:600;padding:.25rem .6rem;border-radius:100px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
    color:var(--text-muted);font-family:'JetBrains Mono',monospace;
    transition:all .3s;
}
.app-card:hover .tech-tag{border-color:rgba(255,255,255,0.15);color:var(--text)}
.card-footer{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:auto;padding-top:.8rem;border-top:1px solid rgba(255,255,255,0.05);
    position:relative;z-index:1;
}
.card-status{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--accent-3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--accent-3)}50%{opacity:.4;box-shadow:none}}
.card-arrow{font-size:1.1rem;color:var(--card-accent,var(--accent-1));transition:transform .3s;opacity:.6}
.app-card:hover .card-arrow{transform:translateX(6px);opacity:1}

/* ═══ FOOTER ═══ */
footer{text-align:center;padding:3rem 2rem 2rem;color:var(--text-muted);font-size:.8rem;border-top:1px solid rgba(255,255,255,0.05);max-width:1400px;margin:0 auto}
#visit-counter{margin-top:1rem;display:inline-flex;gap:1rem;background:rgba(255,255,255,0.02);padding:.5rem 1.5rem;border-radius:20px;border:1px solid rgba(255,255,255,0.05);font-size:.85rem;color:var(--text-muted)}

@media(max-width:768px){
    .hero-logo{width:140px;height:140px}
    .hero-title{font-size:2.2rem}
    .app-grid{grid-template-columns:1fr}
    .apps-container{padding:3rem 1rem}
    .portal-spacer{height:20vh}
    .section-header h2{font-size:1.8rem}
}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ═══ CUSTOM CURSOR ═══ */
@media(pointer: fine){ body { cursor: none; } a, button, .hero-logo, input { cursor: none; } }
.custom-cursor { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; width: 6px; height: 6px; background: var(--accent-1); border-radius: 50%; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background 0.2s; box-shadow: 0 0 10px var(--accent-1); display: none; }
.cursor-trail { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998; width: 34px; height: 34px; border: 1.5px solid rgba(139,92,246,0.4); border-radius: 50%; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, border-color 0.3s, background 0.3s; display: none; }
@media(pointer: fine){ .custom-cursor, .cursor-trail { display: block; } }
.cursor-hover .custom-cursor { width: 0; height: 0; }
.cursor-hover .cursor-trail { width: 54px; height: 54px; background: rgba(139,92,246,0.1); border-color: var(--accent-2); box-shadow: 0 0 20px rgba(6,182,212,0.3); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }

/* ═══ COMMAND PALETTE ═══ */
.cmd-palette { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: flex-start; justify-content: center; padding-top: 15vh; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.cmd-palette.active { opacity: 1; pointer-events: auto; }
.cmd-overlay { position: absolute; inset: 0; background: rgba(3,7,18,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.cmd-modal { position: relative; width: 90%; max-width: 650px; background: rgba(15,23,42,0.75); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; box-shadow: 0 30px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(139,92,246,0.2); transform: translateY(-20px) scale(0.98); transition: transform 0.3s cubic-bezier(.16,1,.3,1); }
.cmd-palette.active .cmd-modal { transform: translateY(0) scale(1); }
.cmd-search-wrapper { display: flex; align-items: center; padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
.cmd-icon { font-size: 1.2rem; margin-right: 1rem; opacity: 0.5; }
#cmd-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 1.2rem; outline: none; font-family: 'Inter', sans-serif; }
#cmd-input::placeholder { color: var(--text-muted); }
.cmd-laser { position: absolute; bottom: -1px; left: 0; height: 2px; width: 100%; background: linear-gradient(90deg, transparent, var(--accent-2), transparent); animation: laserScan 2.5s linear infinite; transform-origin: left; opacity: 0.6; }
@keyframes laserScan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.cmd-results { max-height: 400px; overflow-y: auto; padding: 0.5rem; }
.cmd-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 12px; text-decoration: none; color: var(--text); transition: background 0.2s; cursor: pointer; }
.cmd-item.selected, .cmd-item:hover { background: rgba(255,255,255,0.06); }
.cmd-item-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: rgba(255,255,255,0.03); }
.cmd-item-content { flex: 1; }
.cmd-item-title { font-weight: 600; font-size: 1rem; }
.cmd-item-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
.cmd-item-badge { font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 100px; background: rgba(139,92,246,0.1); color: var(--accent-1); font-weight: 700; letter-spacing: 0.05em; border: 1px solid rgba(139,92,246,0.3); }



/* ═══ AUDIO UI TOGGLE ═══ */
.audio-toggle { position: absolute; top: 2.5rem; right: 2.5rem; z-index: 100; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: all 0.3s; backdrop-filter: blur(10px); }
.audio-toggle:hover { background: rgba(255,255,255,0.1); color: var(--text); transform: scale(1.1); box-shadow: 0 0 20px rgba(139,92,246,0.3); }

/* ═══ CARD GLITCH & PARALLAX HOVER ═══ */
.app-card { transform-style: preserve-3d; }
.card-inner { transform-style: preserve-3d; transition: transform 0.3s cubic-bezier(.16,1,.3,1); }
.app-card:hover .card-inner { transform: translateZ(20px); }
.app-card:hover .card-header { transform: translateZ(30px); transition: transform 0.3s; }
.app-card:hover .card-icon { transform: translateZ(40px) scale(1.1); transition: transform 0.3s; }
.app-card:hover .card-desc { transform: translateZ(20px); transition: transform 0.3s; }
.app-card:hover .card-footer { transform: translateZ(25px); transition: transform 0.3s; }

/* Glitch Animation */
@keyframes cardGlitch {
  0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 2px); filter: hue-rotate(90deg); }
  20% { clip-path: inset(80% 0 10% 0); transform: translate(2px, -2px); filter: hue-rotate(-90deg); }
  40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, -2px); filter: hue-rotate(45deg); }
  60% { clip-path: inset(60% 0 20% 0); transform: translate(2px, 2px); filter: hue-rotate(-45deg); }
  80% { clip-path: inset(20% 0 60% 0); transform: translate(-1px, 1px); filter: hue-rotate(20deg); }
  100% { clip-path: inset(0 0 0 0); transform: translate(0); filter: hue-rotate(0); }
}
.app-card::before { transition: all 0.2s; }
.app-card:hover::after {
    content: ''; position: absolute; inset: 0; background: inherit;
    border-radius: inherit; z-index: 10; pointer-events: none;
    animation: cardGlitch 0.3s cubic-bezier(.25, .46, .45, .94) both;
    opacity: 0.15; mix-blend-mode: overlay;
}

</style>
</head>

/* ═══════════════════════════════════════════════════════
   HERO CANVAS — Gravitational particle field
   ═══════════════════════════════════════════════════════ */
const hc=document.getElementById('hero-canvas');
const hx=hc.getContext('2d');
let W,H,pts=[],mouse={x:-999,y:-999};
function resize(){W=hc.width=window.innerWidth;H=hc.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);
document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

class P{
    constructor(){this.reset()}
    reset(){
        this.angle=Math.random()*Math.PI*2;
        this.dist=100+Math.random()*350;
        this.speed=.002+Math.random()*.01;
        this.r=Math.random()*2+.4;
        this.op=Math.random()*.6+.2;
        this.hue=250+Math.random()*50;
    }
    update(){
        this.angle+=this.speed;
        this.x=W/2+Math.cos(this.angle)*this.dist;
        this.y=H/2+Math.sin(this.angle)*this.dist*.55;
        const dx=mouse.x-this.x,dy=mouse.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){this.x-=dx*.04;this.y-=dy*.04}
    }
    draw(){
        hx.beginPath();
        hx.arc(this.x,this.y,this.r,0,Math.PI*2);
        hx.fillStyle=`hsla(${this.hue},80%,70%,${this.op})`;
        hx.fill();
    }
}
const pN=Math.min(130,Math.floor(W*H/9000));
for(let i=0;i<pN;i++)pts.push(new P);
function heroAnim(){
    hx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++){
        pts[i].update();pts[i].draw();
        for(let j=i+1;j<pts.length;j++){
            const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
            if(d<90){hx.beginPath();hx.moveTo(pts[i].x,pts[i].y);hx.lineTo(pts[j].x,pts[j].y);hx.strokeStyle=`rgba(139,92,246,${.15*(1-d/90)})`;hx.lineWidth=.5;hx.stroke()}
        }
    }
    requestAnimationFrame(heroAnim);
}
heroAnim();

/* ═══════════════════════════════════════════════════════
   3D WORMHOLE TUNNEL — Stars rushing past camera
   ═══════════════════════════════════════════════════════ */
const wc=document.getElementById('wormhole-canvas');
const wx=wc.getContext('2d');
let wW,wH;
function wResize(){wW=wc.width=window.innerWidth;wH=wc.height=window.innerHeight}
wResize();
window.addEventListener('resize',wResize);

const STAR_COUNT=600;
const stars=[];
for(let i=0;i<STAR_COUNT;i++){
    stars.push({
        x:(Math.random()-.5)*2,
        y:(Math.random()-.5)*2,
        z:Math.random()*3+.1,
        speed:.01+Math.random()*.02,
        hue:220+Math.random()*80,
        size:Math.random()*1.5+.5,
    });
}

// Nebula rings
const rings=[];
for(let i=0;i<8;i++){
    rings.push({
        z:i*.4+.5,
        rotation:Math.random()*Math.PI*2,
        rotSpeed:.003+Math.random()*.005,
        hue:250+i*15,
        radius:.3+Math.random()*.2,
    });
}

let wormholeProgress=0; // 0=inactive, 1=full speed

function drawWormhole(){
    wx.fillStyle='rgba(3,7,18,0.15)';
    wx.fillRect(0,0,wW,wH);

    if(wormholeProgress<=0)return;

    const cx=wW/2,cy=wH/2;
    const speedFactor=wormholeProgress;

    // Draw nebula rings
    rings.forEach(ring=>{
        ring.rotation+=ring.rotSpeed*speedFactor;
        const perspective=1/(ring.z*.8+.2);
        const r=ring.radius*Math.min(wW,wH)*perspective;
        const alpha=Math.min(1,speedFactor)*(.15+.1*Math.sin(ring.rotation*3));

        wx.save();
        wx.translate(cx,cy);
        wx.rotate(ring.rotation);
        wx.beginPath();
        wx.ellipse(0,0,r,r*.7,0,0,Math.PI*2);
        wx.strokeStyle=`hsla(${ring.hue},70%,60%,${alpha})`;
        wx.lineWidth=2*perspective;
        wx.shadowBlur=20*perspective;
        wx.shadowColor=`hsla(${ring.hue},80%,50%,.4)`;
        wx.stroke();
        wx.restore();

        // Move ring toward camera
        ring.z-=.008*speedFactor;
        if(ring.z<.1){ring.z=3;ring.hue=250+Math.random()*60}
    });

    // Draw stars
    stars.forEach(star=>{
        star.z-=star.speed*speedFactor*2;
        if(star.z<=.01){
            star.x=(Math.random()-.5)*2;
            star.y=(Math.random()-.5)*2;
            star.z=3;
        }
        const perspective=1/star.z;
        const sx=cx+star.x*wW*perspective*.4;
        const sy=cy+star.y*wH*perspective*.4;
        const sz=star.size*perspective*.8;

        if(sx<-10||sx>wW+10||sy<-10||sy>wH+10)return;

        // Star trail
        const trailLen=Math.min(40,sz*8*speedFactor);
        const dx=sx-cx,dy=sy-cy;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>0&&trailLen>2){
            const nx=dx/dist,ny=dy/dist;
            wx.beginPath();
            wx.moveTo(sx,sy);
            wx.lineTo(sx-nx*trailLen,sy-ny*trailLen);
            const grad=wx.createLinearGradient(sx,sy,sx-nx*trailLen,sy-ny*trailLen);
            grad.addColorStop(0,`hsla(${star.hue},80%,80%,${Math.min(.9,speedFactor)})`);
            grad.addColorStop(1,'transparent');
            wx.strokeStyle=grad;
            wx.lineWidth=Math.max(.5,sz*.6);
            wx.stroke();
        }

        // Star dot
        wx.beginPath();
        wx.arc(sx,sy,Math.max(.3,sz*.4),0,Math.PI*2);
        wx.fillStyle=`hsla(${star.hue},80%,85%,${Math.min(1,speedFactor*.8+.2)})`;
        wx.fill();
    });

    // Central vortex glow
    const vGrad=wx.createRadialGradient(cx,cy,0,cx,cy,120*speedFactor);
    vGrad.addColorStop(0,`rgba(139,92,246,${.2*speedFactor})`);
    vGrad.addColorStop(.5,`rgba(6,182,212,${.08*speedFactor})`);
    vGrad.addColorStop(1,'transparent');
    wx.fillStyle=vGrad;
    wx.fillRect(cx-200,cy-200,400,400);
}

function animWormhole(){
    drawWormhole();
    requestAnimationFrame(animWormhole);
}
animWormhole();

/* ═══ SCROLL CONTROLLER ═══ */
const heroEl=document.getElementById('hero');
const spacer=document.getElementById('portal-spacer');

function onScroll(){
    const scrollY=window.scrollY;
    const vh=window.innerHeight;

    // Phase 1: Hero fade (0 → 0.5vh)
    const heroFade=Math.min(1,scrollY/(vh*0.5));
    heroEl.style.opacity=Math.max(0,1-heroFade*2);
    heroEl.style.transform=`scale(${1-heroFade*.2})`;

    // Phase 2: Wormhole continuo (empieza antes y se queda fijo)
    const wormStart=vh*.1;
    const wormFull=vh*.4;
    if(scrollY>=wormStart){
        wormholeProgress=Math.min(1,(scrollY-wormStart)/(wormFull-wormStart));
        wc.style.opacity=Math.min(1,(scrollY-wormStart)/(vh*.3));
    }else{
        wormholeProgress=0;
        wc.style.opacity=0;
    }
}

window.addEventListener('scroll',onScroll,{passive:true});
onScroll();

/* ═══ COMMAND PALETTE LOGIC ═══ */
const cmdPalette = document.getElementById('cmd-palette');
const cmdInput = document.getElementById('cmd-input');
const cmdResults = document.getElementById('cmd-results');
let cmdOpen = false;
let selectedCmdIndex = 0;

function renderCmdResults(query) {
    const q = query.toLowerCase();
    const filtered = APPS.filter(a => a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q) || a.badge.toLowerCase().includes(q) || a.tech.some(t => t.toLowerCase().includes(q)));
    
    if(filtered.length === 0) {
        cmdResults.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text-muted)">No hay coincidencias.</div>`;
        return;
    }
    
    cmdResults.innerHTML = filtered.map((a, i) => `
        <a href="${a.href}" class="cmd-item ${i===0?'selected':''}" data-index="${i}">
            <div class="cmd-item-icon">${a.icon}</div>
            <div class="cmd-item-content">
                <div class="cmd-item-title">${a.name}</div>
                <div class="cmd-item-desc">${a.desc}</div>
            </div>
            <div class="cmd-item-badge">${a.badge}</div>
        </a>
    `).join('');
    selectedCmdIndex = 0;
}

window.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        cmdOpen = !cmdOpen;
        if(cmdOpen) {
            cmdPalette.classList.add('active');
            cmdInput.value = '';
            renderCmdResults('');
            setTimeout(() => cmdInput.focus(), 50);
        } else {
            cmdPalette.classList.remove('active');
        }
    }
    if (e.key === 'Escape' && cmdOpen) {
        cmdOpen = false;
        cmdPalette.classList.remove('active');
    }
    if (cmdOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
        e.preventDefault();
        const items = cmdResults.querySelectorAll('.cmd-item');
        if(!items.length) return;
        items[selectedCmdIndex].classList.remove('selected');
        if (e.key === 'ArrowDown') selectedCmdIndex = (selectedCmdIndex + 1) % items.length;
        else selectedCmdIndex = (selectedCmdIndex - 1 + items.length) % items.length;
        items[selectedCmdIndex].classList.add('selected');
        items[selectedCmdIndex].scrollIntoView({block: 'nearest'});
    }
    if (cmdOpen && e.key === 'Enter') {
        e.preventDefault();
        const selected = cmdResults.querySelector('.cmd-item.selected');
        if(selected) window.location.href = selected.href;
    }
});

document.getElementById('cmd-overlay').addEventListener('click', () => {
    cmdOpen = false;
    cmdPalette.classList.remove('active');
});
cmdInput.addEventListener('input', e => renderCmdResults(e.target.value));

/* ═══ UI AUDIO SOUNDSCAPE ═══ */
let audioCtx = null;
let droneOsc = null;
let droneGain = null;
let isAudioEnabled = false;

const audioToggle = document.getElementById('audio-toggle');
const iconOff = document.getElementById('audio-icon-off');
const iconOn = document.getElementById('audio-icon-on');

function initAudio() {
    if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        droneOsc = audioCtx.createOscillator();
        droneGain = audioCtx.createGain();
        
        // Drone sound setup
        droneOsc.type = 'triangle';
        droneOsc.frequency.value = 75; // Sub-bass with harmonics for audibility
        droneOsc.connect(droneGain);
        droneGain.connect(audioCtx.destination);
        droneGain.gain.value = 0;
        droneOsc.start();
    }
}

function playTechClick() {
    if(!isAudioEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
    
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.06);
}

audioToggle.addEventListener('click', () => {
    isAudioEnabled = !isAudioEnabled;
    if(isAudioEnabled) {
        initAudio();
        audioCtx.resume();
        iconOff.style.display = 'none';
        iconOn.style.display = 'block';
    } else {
        iconOff.style.display = 'block';
        iconOn.style.display = 'none';
        if(droneGain) droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }
});

// Drone volume based on scroll speed
let lastScrollY = window.scrollY;
let droneVolTarget = 0;
window.addEventListener('scroll', () => {
    if(!isAudioEnabled || !audioCtx) return;
    const diff = Math.abs(window.scrollY - lastScrollY);
    lastScrollY = window.scrollY;
    
    // Increase volume based on scroll speed
    droneVolTarget = Math.min(0.3, diff * 0.004);
}, {passive: true});

// Smooth out drone volume
setInterval(() => {
    if(!isAudioEnabled || !droneGain) return;
    droneVolTarget *= 0.9; // Decay
    const currentGain = droneGain.gain.value;
    droneGain.gain.setTargetAtTime(currentGain + (droneVolTarget - currentGain) * 0.1, audioCtx.currentTime, 0.1);
}, 50);

// Attach hover sound to cards
document.querySelectorAll('.app-card').forEach(card => {
    card.addEventListener('mouseenter', playTechClick);
});

</script>
