    <style>
        :root {
            --bg: #030712;
            --text: #f8fafc;
            --text-muted: #64748b;
            --accent-1: #8b5cf6;
            --accent-2: #06b6d4;
            --accent-3: #10b981;
            --accent-6: #ec4899;
            --card-bg: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════════════════
           HERO — Full screen, logo alive
           ══════════════════════════════════════════════════ */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 2;
        }
        #hero-canvas {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .hero-logo-wrap {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .hero-logo {
            width: 200px; height: 200px;
            border-radius: 32px;
            object-fit: cover;
            box-shadow:
                0 0 60px rgba(139,92,246,0.4),
                0 0 120px rgba(6,182,212,0.2),
                0 0 200px rgba(236,72,153,0.15);
            animation: logoPulse 4s ease-in-out infinite, logoFloat 6s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .hero-logo:hover { transform: scale(1.1) rotate(2deg); }
        @keyframes logoPulse {
            0%,100% { box-shadow: 0 0 60px rgba(139,92,246,0.4), 0 0 120px rgba(6,182,212,0.2); }
            50% { box-shadow: 0 0 80px rgba(139,92,246,0.6), 0 0 180px rgba(6,182,212,0.35), 0 0 250px rgba(236,72,153,0.25); }
        }
        @keyframes logoFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 50%, var(--accent-6) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 6s ease infinite;
            text-align: center;
        }
        @keyframes gradShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .hero-sub {
            font-size: 1.1rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: hintPulse 2s ease-in-out infinite;
        }
        .scroll-hint .arrow {
            width: 24px; height: 24px;
            border-right: 2px solid var(--accent-1);
            border-bottom: 2px solid var(--accent-1);
            transform: rotate(45deg);
            animation: arrowBounce 2s ease-in-out infinite;
        }
        @keyframes hintPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
        @keyframes arrowBounce { 0%,100%{transform:rotate(45deg) translateY(0)} 50%{transform:rotate(45deg) translateY(8px)} }

        /* ══════════════════════════════════════════════════
           PORTAL WORMHOLE TRANSITION
           ══════════════════════════════════════════════════ */
        .portal-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: visible;
        }
        .portal-ring {
            position: sticky;
            top: 50%;
            transform: translateY(-50%);
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-1);
            box-shadow: 0 0 40px rgba(139,92,246,0.4), inset 0 0 40px rgba(139,92,246,0.15);
            z-index: 10;
            pointer-events: none;
            transition: width 0.1s, height 0.1s, border-radius 0.1s;
        }
        .portal-ring::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid rgba(6,182,212,0.3);
            animation: portalSpin 8s linear infinite;
        }
        @keyframes portalSpin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════════════════════════
           APP GRID — Emerging from portal
           ══════════════════════════════════════════════════ */

            width: 100%;
            padding: 4rem 2rem;

        .app-grid {
            display: grid;

            transform: translateY(0) scale(1);
        }
        .app-card::before {

        .card-badge {

        .card-desc { font-size:0.85rem; color:var(--text-muted); line-height:1.6; }
        .card-tech { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .tech-tag {

            border:1px solid rgba(255,255,255,0.08);

            margin-top:auto; padding-top:0.8rem; border-top:1px solid var(--card-border);

        .card-status { display:flex; align-items:center; gap:0.4rem; font-size:0.75rem; color:var(--accent-3); }
        .status-dot { width:6px; height:6px; border-radius:50%; background:var(--accent-3); animation: pulse 2s infinite; }

        .card-arrow { font-size:1.1rem; color:var(--card-accent, var(--accent-1)); transition:transform 0.3s ease; }
        .app-card:hover .card-arrow { transform:translateX(5px); }

        /* Responsive */

            .hero-logo { width:140px; height:140px; }
            .hero-title { font-size:2.2rem; }
            .app-grid { grid-template-columns:1fr; }

        /* Scrollbar */

        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px }
        ::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.2) }
    </style>
</head>

/* ═══════════════════════════════════════════════════════
   HERO PARTICLE CANVAS — Gravitational field around logo
   ═══════════════════════════════════════════════════════ */
const canvas = document.getElementById('hero-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], mouse = {x: -999, y: -999};
const logoEl = document.getElementById('hero-logo');

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

class Particle {
    constructor() {
        this.reset();
    }
    reset() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 120 + Math.random() * 300;
        this.cx = W / 2;
        this.cy = H / 2;
        this.angle = angle;
        this.dist = dist;
        this.speed = 0.002 + Math.random() * 0.008;
        this.radius = Math.random() * 2 + 0.5;
        this.opacity = Math.random() * 0.6 + 0.2;
        this.hue = 250 + Math.random() * 40;
    }
    update() {
        this.angle += this.speed;
        this.cx = W / 2;
        this.cy = H / 2;
        this.x = this.cx + Math.cos(this.angle) * this.dist;
        this.y = this.cy + Math.sin(this.angle) * this.dist * 0.6;

        // Mouse repulsion
        const dx = mouse.x - this.x, dy = mouse.y - this.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 120) {
            this.x -= dx * 0.03;
            this.y -= dy * 0.03;
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.opacity})`;
        ctx.fill();
    }
}

const pCount = Math.min(120, Math.floor(W * H / 10000));
for (let i = 0; i < pCount; i++) particles.push(new Particle());

function drawLines() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < 100) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(139,92,246,${0.12 * (1 - d/100)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }
    }
}

function animateHero() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    drawLines();
    requestAnimationFrame(animateHero);
}
animateHero();

    const rect = portalSection.getBoundingClientRect();
    const vh = window.innerHeight;
    const progress = Math.max(0, Math.min(1, 1 - (rect.top / vh)));

    // Scale from 100px circle to full-screen
    const size = 100 + progress * (Math.max(W, H) * 1.5);
    const borderW = Math.max(0, 3 - progress * 3);
    const blur = 40 - progress * 35;

    portalRing.style.width = size + 'px';
    portalRing.style.height = size + 'px';
    portalRing.style.borderWidth = borderW + 'px';
    portalRing.style.opacity = 1 - progress * 0.8;
    portalRing.style.boxShadow = `0 0 ${blur}px rgba(139,92,246,${0.4 - progress*0.4}), inset 0 0 ${blur}px rgba(139,92,246,${0.15 - progress*0.15})`;

    // Fade hero on scroll
    const heroEl = document.getElementById('hero');
    heroEl.style.opacity = Math.max(0, 1 - progress * 2);
    heroEl.style.transform = `scale(${1 - progress * 0.15})`;
}

/* ═══════════════════════════════════════════════════════
   REVEAL APP CARDS — Intersection Observer
   ═══════════════════════════════════════════════════════ */
const cards = document.querySelectorAll('.app-card');
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const delay = entry.target.dataset.delay || 0;
            setTimeout(() => entry.target.classList.add('revealed'), +delay);
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
cards.forEach(c => observer.observe(c));

/* Card radial follow */
cards.forEach(card => {
    card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
        card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
    });
});

/* Scroll listener */
window.addEventListener('scroll', updatePortal, { passive: true });
updatePortal();

/* ═══════════════════════════════════════════════════════
   VISIT COUNTER
   ═══════════════════════════════════════════════════════ */
const apiBase = (window.__MSBROSS_CONFIG__ && window.__MSBROSS_CONFIG__.apiBase) || '';
fetch(apiBase + '/api/track-visit')
    .then(() => fetch(apiBase + '/api/visits'))
    .then(r => r.json())
    .then(data => {
        document.getElementById('visits-today').textContent = data.today || '0';
        document.getElementById('visits-total').textContent = data.total || '0';
    })
    .catch(() => {
        fetch('https://api.counterapi.dev/v1/msbross/global/up')
            .then(r => r.json())
            .then(res => {
                document.getElementById('visits-today').textContent = 'Activo';
                document.getElementById('visits-total').textContent = res.value || '—';
            })
            .catch(() => {
                document.getElementById('visits-today').textContent = 'Activa';
                document.getElementById('visits-total').textContent = '—';
            });
    });
</script>
