<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPOSITATOR - RTE Tribunal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="./manifest.json">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="h-screen w-screen flex p-4 gap-4 overflow-hidden">
    <main class="flex-1 flex flex-col gap-4">
        <header class="glass p-4 rounded-xl flex justify-between items-center shadow-lg">
            <h1 class="text-2xl font-bold text-emerald-500 tracking-tight flex items-center gap-3">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-500"></div>
                EXPOSITATOR <span class="text-sm text-slate-400 font-mono">v2026.3 (RAG)</span>
            </h1>
            <div class="flex gap-2 items-center bg-slate-800 p-1 rounded-lg border border-slate-700">
                <input type="password" id="gemini-api-key" placeholder="Pegar Gemini API Key..." class="bg-transparent border-none px-3 py-1 text-xs font-mono text-emerald-400 focus:outline-none w-56">
                <button id="btn-save-api" class="bg-slate-700 hover:bg-slate-600 text-slate-300 px-4 py-1.5 rounded text-xs font-bold transition-colors">AÑADIR API</button>
                <div class="w-px h-6 bg-slate-600 mx-1"></div>
                <button id="btn-start" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-1.5 rounded font-bold transition-colors shadow-lg text-sm">INICIAR SESIÓN</button>
            </div>
        </header>
        
        <section class="flex-1 glass rounded-xl relative overflow-hidden flex flex-col border border-slate-700 shadow-xl">
            <video id="webcam-viewport" class="w-full h-1/2 object-cover bg-black" autoplay playsinline muted></video>
            
            <div id="dropzone" class="flex-1 border-t border-slate-700 p-4 flex flex-col justify-center items-center text-slate-400 border-2 border-dashed border-slate-600 m-4 rounded-xl bg-slate-800/30 relative overflow-hidden">
                <p class="z-10 font-mono text-sm pointer-events-none">ARRASTRA AQUÍ LA DIAPOSITIVA ACTIVA</p>
                <img id="current-capture" class="absolute inset-0 w-full h-full object-contain hidden z-20 bg-slate-900/90" />
            </div>
            
            <div class="h-24 bg-slate-900 border-t border-slate-700 p-3 overflow-hidden">
                 <p id="live-transcript" class="text-slate-300 font-mono text-sm leading-relaxed"></p>
            </div>
        </section>
    </main>
    <aside class="w-1/3 glass rounded-xl flex flex-col p-4 font-mono text-sm border border-slate-700 shadow-xl">
        <div class="flex justify-between items-center border-b border-slate-700 pb-3 mb-4">
            <h2 class="text-rose-500 font-bold tracking-widest">TRIBUNAL LOGS</h2>
            <div class="text-right">
                <div class="text-slate-400 text-[10px]">SCORE ACTUAL</div>
                <div id="live-score" class="text-3xl text-emerald-400 font-bold">10.0</div>
            </div>
        </div>

        <div class="bg-slate-800 p-3 rounded border border-slate-700 mb-4 flex flex-col gap-2">
            <div class="text-[10px] text-slate-400 font-bold">BASE DE CONOCIMIENTO (.TXT / .MD)</div>
            <input type="file" id="knowledge-upload" accept=".txt,.md" class="text-xs text-slate-300 file:mr-4 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-slate-700 file:text-emerald-400 hover:file:bg-slate-600">
            <div id="knowledge-status" class="text-[10px] text-amber-500">Documento no cargado. Evaluación genérica activa.</div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-4 text-center">
            <div class="bg-slate-800 rounded p-2 border border-slate-700">
                <div class="text-[10px] text-slate-400">WPM</div>
                <div id="metric-wpm" class="text-white font-bold">0</div>
            </div>
            <div class="bg-slate-800 rounded p-2 border border-slate-700">
                <div class="text-[10px] text-slate-400">MULETILLAS</div>
                <div id="metric-fillers" class="text-amber-400 font-bold">0</div>
            </div>
            <div class="bg-slate-800 rounded p-2 border border-slate-700">
                <div class="text-[10px] text-slate-400">DESVIACIONES</div>
                <div id="metric-deviations" class="text-red-400 font-bold">0</div>
            </div>
        </div>
        
        <div id="logs-container" class="flex-1 overflow-y-auto space-y-2 text-slate-300 pr-2"></div>
    </aside>
    <script type="module" src="./main.js"></script>
</body>
</html>
