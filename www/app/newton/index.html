<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redireccionando a Newton...</title>
    <meta http-equiv="refresh" content="0; url=https://newton.msbross.me">
    <style>
        body {
            background: #030712;
            color: #f8fafc;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(249,115,22,0.1);
            border-left-color: #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Abriendo Newton Mequinenza...</p>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 10px;">Si no redirige automáticamente, <a href="https://newton.msbross.me" style="color: #f97316;">haz clic aquí</a></p>
    </div>
    <script>
        window.location.replace("https://newton.msbross.me");
    </script>
</body>
</html>
