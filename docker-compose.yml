services:
  # IAPuta OS
  iaputa-backend:
    build: ./apps/iaputa-os/backend
    ports: ["8006:8000"]
    env_file: .env.local
    volumes: [iaputa-audio:/app/temp_audio, iaputa-vision:/app/temp_vision]
    networks: [msbrossai-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s; timeout: 10s; retries: 3
  iaputa-frontend:
    build: ./apps/iaputa-os/frontend
    ports: ["8080:80"]
    depends_on: [iaputa-backend]
    networks: [msbrossai-network]
    restart: unless-stopped

  # LIVEKIT Nikolina
  livekit-server:
    build:
      context: ./apps/livekit-nikolina
      dockerfile: server/Dockerfile
    ports: ["8000:8000"]
    env_file: .env.local
    volumes: [livekit-data:/app/data, livekit-logs:/app/logs]
    networks: [msbrossai-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s; timeout: 10s; retries: 3
  livekit-agent:
    build:
      context: ./apps/livekit-nikolina
      dockerfile: agent/Dockerfile
    env_file: .env.local
    depends_on: [livekit-server]
    networks: [msbrossai-network]
    restart: unless-stopped
  livekit-frontend:
    build: ./apps/livekit-nikolina/frontend
    ports: ["5174:80"]
    depends_on: [livekit-server]
    networks: [msbrossai-network]
    restart: unless-stopped

  # Arantxa Translate
  arantxa-server:
    build: ./apps/arantxa-translate/server
    ports: ["3001:3001"]
    env_file: .env.local
    networks: [msbrossai-network]
    restart: unless-stopped
  arantxa-client:
    build: ./apps/arantxa-translate/client
    ports: ["5173:80"]
    depends_on: [arantxa-server]
    networks: [msbrossai-network]
    restart: unless-stopped

  # TaskFlowPro
  taskflow-pro:
    build: ./apps/taskflow-pro
    ports: ["8887:80"]
    networks: [msbrossai-network]
    restart: unless-stopped

  # DOHLER
  dohler-backend:
    build: ./apps/dohler/backend
    ports: ["8002:8000"]
    env_file: .env.local
    volumes: [dohler-data:/app/data]
    networks: [msbrossai-network]
    restart: unless-stopped
  dohler-frontend:
    build: ./apps/dohler/frontend
    ports: ["3000:80"]
    depends_on: [dohler-backend]
    networks: [msbrossai-network]
    restart: unless-stopped

  # LogiSearch
  logisearch:
    build: ./apps/logisearch
    ports: ["5175:80"]
    env_file: .env.local
    networks: [msbrossai-network]
    restart: unless-stopped

  # Edelweiss
  edelweiss:
    build: ./apps/edelweiss
    ports: ["5176:80"]
    networks: [msbrossai-network]
    restart: unless-stopped

  # Moko-Tools
  moko-tools:
    build: ./apps/moko-tools
    ports: ["5177:80"]
    networks: [msbrossai-network]
    restart: unless-stopped

  # CombiPro
  combipro:
    build: ./apps/combipro
    ports: ["5178:80"]
    networks: [msbrossai-network]
    restart: unless-stopped

  # Dashboard
  dashboard:
    build: ./dashboard
    ports: ["5179:80"]
    networks: [msbrossai-network]
    restart: unless-stopped

networks:
  msbrossai-network: { driver: bridge }

volumes:
  iaputa-audio:
  iaputa-vision:
  livekit-data:
  livekit-logs:
  dohler-data:
