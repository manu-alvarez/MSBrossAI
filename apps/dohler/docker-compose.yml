services:
  dohler-backend:
    build: ./backend
    ports: ["8002:8000"]
    env_file: ../../.env.local
    volumes: [dohler-data:/app/data]
    networks: [msbrossai-network]
  dohler-frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [dohler-backend]
    networks: [msbrossai-network]
networks:
  msbrossai-network: { driver: bridge }
volumes:
  dohler-data:
