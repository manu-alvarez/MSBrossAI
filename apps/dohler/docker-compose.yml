services:
  dohler-backend:
    build: ./backend
    container_name: msbrossai-dohler-backend
    ports:
      - "8002:8000"
    env_file:
      - ../../.env.local
    volumes:
      - dohler-data:/app/data
    networks:
      - msbrossai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dohler-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: msbrossai-dohler-frontend
    ports:
      - "3000:80"
    networks:
      - msbrossai-network
    restart: unless-stopped
    depends_on:
      dohler-backend:
        condition: service_healthy

networks:
  msbrossai-network:
    driver: bridge

volumes:
  dohler-data:
