version: "3.9"

services:
  # ═══════════════════════════════════════════════════════
  # PostgreSQL + pgvector
  # ═══════════════════════════════════════════════════════
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jartosdto-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jartosdto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jartosdto_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jartosdto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jartosdto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════
  # Redis
  # ═══════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: jartosdto-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════
  # MinIO (S3-compatible file storage)
  # ═══════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: jartosdto-minio
    restart: unless-stopped
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-jartosdto}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-jartosdto_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════
  # FastAPI Backend
  # ═══════════════════════════════════════════════════════
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jartosdto-server
    restart: unless-stopped
    ports:
      - "8100:8000"
    env_file: .env
    volumes:
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════
  # Next.js Frontend
  # ═══════════════════════════════════════════════════════
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: jartosdto-client
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - server

  # ═══════════════════════════════════════════════════════
  # Nginx Reverse Proxy
  # ═══════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: jartosdto-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - client
      - server

volumes:
  postgres_data:
  redis_data:
  minio_data:
