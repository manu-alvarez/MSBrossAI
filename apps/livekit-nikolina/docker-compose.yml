services:
  livekit-server:
    build: ./server
    container_name: msbrossai-livekit-server
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.local
    volumes:
      - livekit-data:/app/data
      - livekit-logs:/app/logs
    networks:
      - msbrossai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  livekit-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: msbrossai-livekit-agent
    env_file:
      - ../../.env.local
    volumes:
      - livekit-logs:/app/logs
    networks:
      - msbrossai-network
    restart: unless-stopped
    depends_on:
      livekit-server:
        condition: service_healthy

  livekit-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: msbrossai-livekit-frontend
    ports:
      - "5174:80"
    networks:
      - msbrossai-network
    restart: unless-stopped
    depends_on:
      livekit-server:
        condition: service_healthy

networks:
  msbrossai-network:
    driver: bridge

volumes:
  livekit-data:
  livekit-logs:
