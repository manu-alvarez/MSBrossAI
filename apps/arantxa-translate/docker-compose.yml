services:
  arantxa-server:
    build: ./server
    ports: ["3001:3001"]
    env_file: ../../.env.local
    networks: [msbrossai-network]
  arantxa-client:
    build: ./client
    ports: ["5173:80"]
    depends_on: [arantxa-server]
    networks: [msbrossai-network]
networks:
  msbrossai-network: { driver: bridge }
