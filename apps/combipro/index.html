<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMBIPRO v2 // NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #050508; --accent: #00ff88; --accent-glow: rgba(0,255,136,0.3); --card-bg: rgba(15,15,25,0.7); --glass-border: rgba(255,255,255,0.08); --text: #f0f4f8; --text-dim: #8892b0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; min-height: 100vh; }
    .nexus-shell { max-width: 800px; margin: 0 auto; padding: 2rem 1.25rem; display: flex; flex-direction: column; gap: 2rem; }
    header { text-align: left; border-left: 4px solid var(--accent); padding-left: 1.5rem; margin-bottom: 1rem; }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    header p { color: var(--text-dim); font-size: 0.9rem; margin-top: 0.25rem; }
    .section { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; }
    .section h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent); }
    .league-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; }
    .league-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
    .league-btn:hover { border-color: var(--accent); }
    .league-btn:has(input:checked) { background: rgba(0,255,136,0.1); border-color: var(--accent); }
    .league-btn input { display: none; }
    .risk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .risk-btn { padding: 0.75rem; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; font-weight: 600; }
    .risk-btn:hover { border-color: var(--accent); }
    .risk-btn.active { background: rgba(0,255,136,0.1); border-color: var(--accent); color: var(--accent); }
    .input-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .input-row input { flex: 1; padding: 0.75rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 0.9rem; }
    .generate-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--accent), #00cc6a); border: none; border-radius: 12px; color: #000; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px; }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .pick-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
    .pick-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .pick-league { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-transform: uppercase; }
    .pick-odds { font-size: 1.25rem; font-weight: 800; color: #fff; }
    .pick-match { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.25rem; }
    .pick-type { font-size: 0.8rem; color: var(--text-dim); }
    .combo-card { background: linear-gradient(135deg, rgba(0,255,136,0.05), rgba(0,204,106,0.05)); border: 1px solid rgba(0,255,136,0.2); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
    .combo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .combo-total { font-size: 2rem; font-weight: 900; color: var(--accent); }
    .combo-stake { font-size: 0.9rem; color: var(--text-dim); }
    .combo-profit { font-size: 1.1rem; font-weight: 700; color: #fff; margin-top: 0.5rem; }
    .status-text { text-align: center; color: var(--text-dim); padding: 2rem; font-size: 0.9rem; }
    .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; color: var(--text); text-decoration: none; font-size: 0.85rem; margin-bottom: 1rem; transition: all 0.3s; }
    .back-btn:hover { border-color: var(--accent); }
    @media (max-width: 600px) { .nexus-shell { padding: 1rem; } .risk-grid { grid-template-columns: 1fr; } .input-row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="nexus-shell">
    <a href="https://msbross.me/" class="back-btn">← Volver al Ecosistema</a>
    <header>
      <h1>⚽ COMBIPRO v2</h1>
      <p>Generador de combinadas deportivas con análisis de cuotas</p>
    </header>

    <div class="section">
      <h2>🏟️ Ligas</h2>
      <div class="league-grid" id="leagueSelector">
        <label class="league-btn"><input type="checkbox" value="UCL" checked> ⚽ <span>Champions League</span></label>
        <label class="league-btn"><input type="checkbox" value="EPL" checked> 🇬🇧 <span>Premier League</span></label>
        <label class="league-btn"><input type="checkbox" value="LALIGA" checked> 🇪🇸 <span>LaLiga</span></label>
        <label class="league-btn"><input type="checkbox" value="SERIEA" checked> 🇮🇹 <span>Serie A</span></label>
        <label class="league-btn"><input type="checkbox" value="BUNDES" checked> 🇩🇪 <span>Bundesliga</span></label>
        <label class="league-btn"><input type="checkbox" value="LIGUE1"> 🇫🇷 <span>Ligue 1</span></label>
      </div>
    </div>

    <div class="section">
      <h2>🎯 Perfil de Riesgo</h2>
      <div class="risk-grid">
        <div class="risk-btn" data-risk="safe" onclick="selectRisk(this)">🟢 Seguro</div>
        <div class="risk-btn active" data-risk="balanced" onclick="selectRisk(this)">🟡 Equilibrado</div>
        <div class="risk-btn" data-risk="turbo" onclick="selectRisk(this)">🔴 Turbo</div>
      </div>
    </div>

    <div class="section">
      <h2>💰 Configuración</h2>
      <div class="input-row">
        <input type="date" id="targetDate" value="">
        <input type="number" id="stakeInput" placeholder="Stake (€)" value="10" min="1">
      </div>
      <button class="generate-btn" id="generateBtn" onclick="generateCombos()">⚡ GENERAR COMBINADA</button>
    </div>

    <div id="resultsSection"></div>
  </div>

  <script>
    // Set today's date as default
    document.getElementById('targetDate').valueAsDate = new Date();
    let selectedRisk = 'balanced';

    function selectRisk(el) {
      document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      selectedRisk = el.dataset.risk;
    }

    // Simulated match data with realistic odds
    const MATCH_DATA = {
      UCL: [
        { home: 'Real Madrid', away: 'Manchester City', h2h: [2.10, 3.40, 3.20], o25: 1.65, btts: 1.70, ht_o05: 1.35 },
        { home: 'Bayern Munich', away: 'PSG', h2h: [1.85, 3.60, 3.80], o25: 1.55, btts: 1.60, ht_o05: 1.30 },
        { home: 'Barcelona', away: 'Napoli', h2h: [1.70, 3.80, 4.50], o25: 1.70, btts: 1.75, ht_o05: 1.40 },
        { home: 'Arsenal', away: 'Inter Milan', h2h: [2.00, 3.30, 3.50], o25: 1.80, btts: 1.80, ht_o05: 1.35 },
      ],
      EPL: [
        { home: 'Liverpool', away: 'Chelsea', h2h: [1.75, 3.60, 4.20], o25: 1.60, btts: 1.65, ht_o05: 1.30 },
        { home: 'Man United', away: 'Tottenham', h2h: [2.30, 3.40, 2.90], o25: 1.70, btts: 1.70, ht_o05: 1.35 },
        { home: 'Newcastle', away: 'Aston Villa', h2h: [2.00, 3.50, 3.40], o25: 1.75, btts: 1.75, ht_o05: 1.40 },
      ],
      LALIGA: [
        { home: 'Atlético Madrid', away: 'Real Sociedad', h2h: [1.90, 3.40, 3.80], o25: 1.85, btts: 1.80, ht_o05: 1.40 },
        { home: 'Villarreal', away: 'Athletic Bilbao', h2h: [2.10, 3.30, 3.30], o25: 1.90, btts: 1.85, ht_o05: 1.45 },
        { home: 'Real Betis', away: 'Sevilla', h2h: [2.20, 3.20, 3.20], o25: 1.95, btts: 1.90, ht_o05: 1.50 },
      ],
      SERIEA: [
        { home: 'AC Milan', away: 'Juventus', h2h: [2.40, 3.20, 2.90], o25: 1.80, btts: 1.75, ht_o05: 1.35 },
        { home: 'Roma', away: 'Lazio', h2h: [2.10, 3.40, 3.20], o25: 1.75, btts: 1.70, ht_o05: 1.35 },
      ],
      BUNDES: [
        { home: 'Dortmund', away: 'RB Leipzig', h2h: [2.00, 3.60, 3.30], o25: 1.50, btts: 1.55, ht_o05: 1.25 },
        { home: 'Leverkusen', away: 'Stuttgart', h2h: [1.65, 3.80, 4.80], o25: 1.55, btts: 1.60, ht_o05: 1.30 },
      ],
      LIGUE1: [
        { home: 'Marseille', away: 'Lyon', h2h: [2.10, 3.40, 3.20], o25: 1.70, btts: 1.70, ht_o05: 1.35 },
        { home: 'Monaco', away: 'Lille', h2h: [2.00, 3.50, 3.40], o25: 1.75, btts: 1.75, ht_o05: 1.40 },
      ]
    };

    const PICK_TYPES = [
      { name: 'Equipo Ganador (1X2)', key: 'h2h', label: (m) => m.home + ' vs ' + m.away },
      { name: 'Más/Menos 2.5 Goles', key: 'o25', label: (m) => 'Más de 2.5 goles' },
      { name: 'Ambos Equipos Marcan', key: 'btts', label: (m) => 'Ambos marcan: Sí' },
      { name: 'Más 0.5 Goles 1ª Mitad', key: 'ht_o05', label: (m) => 'Gol en 1ª mitad' },
    ];

    function generateCombos() {
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Analizando...';

      setTimeout(() => {
        const selectedLeagues = Array.from(document.querySelectorAll('#leagueSelector input:checked')).map(c => c.value);
        if (selectedLeagues.length === 0) { alert('Selecciona al menos una liga.'); btn.disabled = false; btn.textContent = '⚡ GENERAR COMBINADA'; return; }

        const stake = parseFloat(document.getElementById('stakeInput').value) || 10;
        const allPicks = [];

        for (const league of selectedLeagues) {
          const matches = MATCH_DATA[league] || [];
          for (const match of matches) {
            for (const pickType of PICK_TYPES) {
              const odds = match[pickType.key];
              if (Array.isArray(odds)) {
                // 1X2 - pick best value based on risk
                let idx = selectedRisk === 'safe' ? (odds[0] < odds[2] ? 0 : 2) : selectedRisk === 'turbo' ? 1 : 0;
                allPicks.push({ league, match: pickType.label(match), pickType: pickType.name, pick: ['Local', 'Empate', 'Visitante'][idx], odds: odds[idx] });
              } else {
                allPicks.push({ league, match: match.home + ' vs ' + match.away, pickType: pickType.name, pick: pickType.label(match), odds: odds });
              }
            }
          }
        }

        // Generate combos based on risk
        const comboSizes = selectedRisk === 'safe' ? [3, 4] : selectedRisk === 'balanced' ? [4, 5, 6] : [6, 7, 8];
        const combos = [];

        for (const size of comboSizes) {
          const shuffled = [...allPicks].sort(() => Math.random() - 0.5);
          const combo = shuffled.slice(0, Math.min(size, shuffled.length));
          const totalOdds = combo.reduce((acc, p) => acc * p.odds, 1);
          combos.push({ picks: combo, totalOdds: totalOdds.toFixed(2), stake, potentialWin: (stake * totalOdds).toFixed(2) });
        }

        renderCombos(combos);
        btn.disabled = false;
        btn.textContent = '⚡ GENERAR COMBINADA';
      }, 1500);
    }

    function renderCombos(combos) {
      const section = document.getElementById('resultsSection');
      let html = '<div class="section"><h2>🎫 Combinadas Generadas</h2>';

      combos.forEach((combo, i) => {
        html += `<div class="combo-card">
          <div class="combo-header">
            <div>
              <div style="font-size:0.85rem;color:var(--text-dim)">Combinada #${i + 1} · ${combo.picks.length} picks</div>
              <div class="combo-total">Cuota: ${combo.totalOdds}</div>
              <div class="combo-profit">Ganancia potencial: ${combo.potentialWin}€ (stake: ${combo.stake}€)</div>
            </div>
          </div>`;

        combo.picks.forEach(pick => {
          html += `<div class="pick-card">
            <div class="pick-header">
              <span class="pick-league">${pick.league}</span>
              <span class="pick-odds">${pick.odds.toFixed(2)}</span>
            </div>
            <div class="pick-match">${pick.match}</div>
            <div class="pick-type">${pick.pickType}: <strong>${pick.pick}</strong></div>
          </div>`;
        });

        html += '</div>';
      });

      html += '</div>';
      section.innerHTML = html;
    }
  </script>
</body>
</html>
