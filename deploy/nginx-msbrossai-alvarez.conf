server {
    listen 80;
    server_name msbrossai.alvarezconsult.com;

    root /home/manuel/MSBrossAI/www;
    index index.html;

    # Main index - MSBrossAI Dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # IAPuta OS
    location /iaputa/ {
        alias /home/manuel/iaputa-os/frontend/dist/;
        try_files $uri $uri/ /iaputa/index.html;
    }

    # LIVEKIT Nikolina
    location /nikolina/ {
        alias /home/manuel/LIVEKIT/frontend/dist/;
        try_files $uri $uri/ /nikolina/index.html;
    }

    # Arantxa Translate
    location /traductor/ {
        alias /home/manuel/Traductor/client/dist/;
        try_files $uri $uri/ /traductor/index.html;
    }

    # TaskFlowPro
    location /taskflow/ {
        alias /home/manuel/TASKFLOWPRO/dist/;
        try_files $uri $uri/ /taskflow/index.html;
    }

    # DOHLER
    location /dohler/ {
        alias /home/manuel/DOHLER/frontend/dist/;
        try_files $uri $uri/ /dohler/index.html;
    }

    # LogiSearch
    location /logisearch/ {
        alias /home/manuel/LogiSearch/dist/;
        try_files $uri $uri/ /logisearch/index.html;
    }

    # Edelweiss
    location /edelweiss/ {
        alias /home/manuel/EDELWEISS/dist/;
        try_files $uri $uri/ /edelweiss/index.html;
    }

    # Moko-Tools
    location /moko/ {
        alias /home/manuel/MOKO-TOOLS/moko_tooling_utils/nextjs_space/out/;
        try_files $uri $uri/ /moko/index.html;
    }

    # CombiPro
    location /combipro/ {
        alias /home/manuel/MSBrossAI/apps/combipro/dist/;
        try_files $uri $uri/ /combipro/index.html;
    }

    # Dashboard Premium
    location /dashboard/ {
        alias /home/manuel/MSBrossAI/dashboard/dist/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Dev Panel
    location /dev/ {
        alias /home/manuel/LIVEKIT/dashboards/dev-dashboard/dist/;
        try_files $uri $uri/ /dev/index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
