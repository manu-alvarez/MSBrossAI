# MSBrossAI — Nginx Hardened Production Configuration
# Host-Native Deploy Profile (cero Docker)
# Path: /Users/manu/Desktop/MSBrossAI/deploy/nginx.conf

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────────
    # LOGGING STRUCTURE (JSON for advanced monitoring)
    # ─────────────────────────────────────────────────────────────────────────
    log_format json_analytics escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"client_ip":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access_log.json json_analytics;

    # ─────────────────────────────────────────────────────────────────────────
    # NETWORK TUNING & I/O OPTIMIZATION (Prevent Slowloris / Buffer Overflow)
    # ─────────────────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    reset_timedout_connection on;

    # Buffer Limits
    client_body_buffer_size      128k;
    client_header_buffer_size    4k;
    client_max_body_size         64M; # For model/file uploads (iaputa, cuentosmagicos)
    large_client_header_buffers  4 16k;

    # Timeout Safeguards
    client_body_timeout   15s;
    client_header_timeout 15s;
    keepalive_timeout     65s;
    keepalive_requests    1000;
    send_timeout          15s;

    # ─────────────────────────────────────────────────────────────────────────
    # WEBSOCKET UPGRADE MAPPING
    # ─────────────────────────────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # GZIP COMPRESSION
    # ─────────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_static on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xhtml+xml
        application/rss+xml
        image/svg+xml;

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP REDIRECT TO HTTPS (Force TLS)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name msbross.me www.msbross.me;

        # Let's Encrypt ACME challenge directory
        location /.well-known/acme-challenge/ {
            root /var/www/html;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HARDENED SSL HTTPS SERVER (MSBROSS CENTRAL GATEWAY)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name msbross.me www.msbross.me;

        # TLS Certificates paths (host-native Let's Encrypt default)
        ssl_certificate     /etc/letsencrypt/live/msbross.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/msbross.me/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/msbross.me/chain.pem;

        # TLS v1.3 strict configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        # Session cache tuning
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # Diffie-Hellman Parameter Tuning (Force 4096 bits security)
        ssl_dhparam /etc/nginx/ssl/dhparam.pem;

        # Security Headers (OWASP compliant)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval' wss: ws:; frame-ancestors 'self';" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # ─────────────────────────────────────────────────────────────────────
        # REVERSE PROXY TO MSBROSS UNIFIED GATEWAY (PORT 8080)
        # ─────────────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://127.0.0.1:8080;
            
            # Keep-alive options
            proxy_http_version 1.1;
            
            # WebSocket and Hop-by-Hop headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Core Request Metadata Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering       off;
        }

        # ─────────────────────────────────────────────────────────────────────
        # LIVEKIT WEBRTC SIGNALING DIRECT PROXY (If deployed locally)
        # ─────────────────────────────────────────────────────────────────────
        location /rtc {
            proxy_pass http://127.0.0.1:7880;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WeBRTC signaling requires very long timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }
    }
}
