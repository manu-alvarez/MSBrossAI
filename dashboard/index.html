<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSBrossAI - Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', sans-serif; background:#f5f7fa; color:#111; }
    h1 { text-align:center; margin-top:24px; }
    .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; max-width:980px; margin:0 auto; padding:20px; }
    .card { display:flex; align-items:center; justify-content:center; padding:20px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; text-align:center; text-decoration:none; color:#111; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .status { display:block; margin-top:6px; font-size:12px; color:#555; }
  </style>
</head>
<body>
  <h1>MSBROSSAI Dashboard</h1>
  <div class="grid" aria-label="dashboard-grid">
    <a class="card" href="https://msbross.me/traductor/" target="_blank">Arantxa Translate PRO
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/combipro/" target="_blank">CombiPro
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/dohler/" target="_blank">Döhler
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/edelweiss/" target="_blank">Edelweiss
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/iaputa/" target="_blank">IAPuta OS
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/nikolina/" target="_blank">LiveKit Nikolina
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/logisearch/" target="_blank">LogiSearch
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/moko-tools/" target="_blank">Moko-Tools
      <span class="status">Status: analysis</span>
    </a>
    <a class="card" href="https://msbross.me/taskflow/" target="_blank">TaskFlowPro
      <span class="status">Status: analysis</span>
    </a>
  </div>
</body>
</html>
